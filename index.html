<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Chess Game</h1>
            <div class="game-controls">
                <button id="newGame" class="btn btn-primary">New Game</button>
                <button id="undoMove" class="btn btn-secondary">Undo Move</button>
            </div>
        </header>

        <div class="game-content">
            <div class="game-info">
                <div class="player-info">
                    <div class="player white-player">
                        <div class="player-color"></div>
                        <span>White to move</span>
                    </div>
                    <div class="player black-player">
                        <div class="player-color"></div>
                        <span>Black</span>
                    </div>
                </div>
                
                <div class="game-status">
                    <div id="gameStatus" class="status-text">Game in progress</div>
                    <div id="moveHistory" class="move-history">
                        <h3>Move History</h3>
                        <div class="moves-list"></div>
                    </div>
                </div>
            </div>

            <div class="chess-board-container">
                <div class="board-coordinates">
                    <div class="files">
                        <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
                    </div>
                </div>
                <div class="chess-board" id="chessBoard">
                    <!-- Chess squares will be generated by JavaScript -->
                </div>
                <div class="board-coordinates ranks">
                    <div class="ranks-numbers">
                        <span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="captured-pieces">
            <div class="captured-white">
                <h4>Captured White Pieces</h4>
                <div class="pieces-container"></div>
            </div>
            <div class="captured-black">
                <h4>Captured Black Pieces</h4>
                <div class="pieces-container"></div>
            </div>
        </div>
    </div>

    <script src="chess.js"></script>
</body>
</html>
